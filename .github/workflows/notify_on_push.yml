name: Notify on Push

on:
  push:
    branches:
      - main

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Nouveau commit dans stage-ete"
          from: ${{ secrets.EMAIL_USER }}
          to: "dalijawadi785@gmail.com"
          body: |
            Un nouveau commit a été poussé sur la branche main.
            Repo: dali999999/stage-ete
            Commit: ${{ github.event.head_commit.message }}
            Auteur: ${{ github.event.head_commit.author.name }}
            Lien: ${{ github.event.head_commit.url }}
